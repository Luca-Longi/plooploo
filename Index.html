<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everyday Forms</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #ffffff;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        video {
            max-width: 80vmin; max-height: 80vmin;
            mix-blend-mode: multiply; /* Blends any edge artifacts flawlessly into #ffffff */
        }
    </style>
</head>
<body>
    <video autoplay loop muted playsinline>
        <source src="assets/daily_loop.mp4" type="video/mp4">
    </video>
</body>
</html>
