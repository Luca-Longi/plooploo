<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plooploo</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      mix-blend-mode: multiply;
      display: block;
    }

    .logo {
      position: fixed;
      top: 10px;
      left: 10px;
      height: 100px;
      animation: spin-ccw 8s linear infinite;
      z-index: 10;
    }

    @keyframes spin-ccw {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    .loop-label {
      position: fixed;
      top: 40px;
      left: 150px;
      text-align: left;
      font-family: "Courier New", Courier, monospace;
      font-size: 32px;
      color: #ffffff;
      -webkit-text-stroke: 5px #000000;
      paint-order: stroke fill;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.svg" alt="logo" />
  <div class="loop-label" id="loop-label">LOOP #</div>
  <video
    src="assets/daily_loop.webm"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  ></video>
  <script>
    fetch('render_log.json')
      .then((res) => res.json())
      .then((data) => {
        document.getElementById('loop-label').textContent = `LOOP #${data.video_count}`;
      })
      .catch(() => {});
  </script>
</body>
</html>
