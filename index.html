<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>loop</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    video {
      width: 100%;
      object-fit: contain;
      mix-blend-mode: multiply;
      display: block;
    }
  </style>
</head>
<body>
  <video
    src="assets/daily_loop.webm"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  ></video>
</body>
</html>
